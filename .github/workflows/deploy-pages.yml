name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install pygame-ce pygbag

      - name: Build with pygbag
        run: pygbag --build main.py

      - name: Style loading screen
        run: |
          python3 - << 'EOF'
          with open("build/web/index.html", "r") as f:
              html = f.read()

          style = """<style>
            /* Loading screen background + text theme */
            body {
              background: #0a0a1e !important;
              font-family: monospace !important;
            }
            /* DO NOT set display:flex or position on body — pygbag uses
               position:absolute canvas that fills the viewport */
            div, p, span, td, th { color: #ffd700 !important; font-family: monospace !important; }
            a { color: #64a0dc !important; }
            progress, meter { accent-color: #ffd700 !important; }
            table { background: #0a0a1e !important; }
            /* DO NOT add border/padding to canvas — pygbag explicitly warns
               this breaks mouse coordinate mapping */
          </style>"""

          html = html.replace("</head>", style + "\n</head>", 1)

          with open("build/web/index.html", "w") as f:
              f.write(html)
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
